<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Lab</title>
    <style>
      body {
        margin: 0;
        font-family: "SF Pro Text", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f4f7fb 0%, #edf2f7 100%);
        color: #16202a;
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 24px;
      }

      .card {
        background: white;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(44, 62, 80, 0.12);
        display: grid;
        gap: 16px;
      }

      h1,
      p {
        margin: 0;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      input {
        border: 1px solid #cfd8e3;
        border-radius: 10px;
        padding: 12px 14px;
        font: inherit;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        background: #0f6fff;
        color: white;
        cursor: pointer;
      }

      .result {
        border-radius: 12px;
        background: #0f172a;
        color: #eff6ff;
        padding: 14px;
        min-height: 52px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p>Codex Claude Bridge Demo</p>
        <h1 id="lab-heading">Browser Lab</h1>
        <p>This page exists to validate picked-element action requests against a deterministic local UI.</p>

        <label>
          <span>Message</span>
          <input id="note-input" type="text" placeholder="Type a message for the lab" />
        </label>

        <button id="apply-btn" type="button">Apply Message</button>

        <div id="result" class="result">No message applied yet.</div>
      </section>
    </main>

    <script>
      const input = document.getElementById("note-input");
      const button = document.getElementById("apply-btn");
      const result = document.getElementById("result");

      button.addEventListener("click", () => {
        result.textContent = input.value
          ? `Applied: ${input.value}`
          : "Applied: (empty)";
      });
    </script>
  </body>
</html>
